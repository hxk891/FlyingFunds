{% extends "base.html" %}
{% block title %}News | FlyingFunds{% endblock %}

{% block content %}
<style>

  .news-header {
    display: flex; align-items: flex-end; justify-content: space-between;
    flex-wrap: wrap; gap: 12px; margin-bottom: 24px;
  }
  .news-header h1 {
    font-family: 'Instrument Serif', serif; font-size: 36px;
    font-weight: 400; letter-spacing: -0.8px; color: var(--dark); margin: 0;
  }
  .news-sub { font-size: 13px; color: var(--muted); margin: 4px 0 0; }
  #newsRefreshBtn {
    font-size: 12px; font-weight: 600; color: var(--brown);
    background: none; border: 1.5px solid rgba(45,31,26,0.15);
    border-radius: 20px; padding: 6px 14px; cursor: pointer;
    transition: all 0.15s; display: flex; align-items: center; gap: 5px;
  }
  #newsRefreshBtn:hover { background: var(--warm); border-color: var(--rose); color: var(--dark); }
  #newsRefreshBtn.spinning svg { animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Filter chips */
  .news-filters {
    display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 20px;
  }
  .filter-chip {
    font-size: 12px; font-weight: 600; padding: 5px 14px;
    border-radius: 20px; border: 1.5px solid rgba(45,31,26,0.12);
    background: #fff; color: var(--muted); cursor: pointer;
    transition: all 0.15s;
  }
  .filter-chip:hover { border-color: var(--rose); color: var(--dark); }
  .filter-chip.active { background: var(--dark); color: #fff; border-color: var(--dark); }

  /* Grid */
  .news-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 18px;
  }

  /* Card */
  .news-card {
    background: #fff; border: 1.5px solid rgba(45,31,26,0.08);
    border-radius: 18px; overflow: hidden;
    display: flex; flex-direction: column;
    transition: transform 0.22s, box-shadow 0.22s, border-color 0.22s;
  }
  .news-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 32px rgba(45,31,26,0.1);
    border-color: var(--pink);
  }
  .news-card-img {
    width: 100%; height: 160px; object-fit: cover;
    background: var(--warm); flex-shrink: 0;
  }
  .news-card-img-placeholder {
    width: 100%; height: 120px; background: var(--warm);
    display: flex; align-items: center; justify-content: center;
    font-size: 32px; flex-shrink: 0;
  }
  .news-card-body { padding: 18px 20px 20px; flex: 1; display: flex; flex-direction: column; }
  .news-meta {
    display: flex; align-items: center; gap: 7px;
    font-size: 11px; font-weight: 700; color: var(--rose);
    text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 9px;
  }
  .news-meta-sep { color: var(--pink); }
  .news-date { color: var(--muted); font-weight: 400; text-transform: none; letter-spacing: 0; }
  .news-cat-badge {
    font-size: 10px; padding: 2px 7px; border-radius: 10px;
    font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;
  }
  .news-cat-badge.markets  { background: #eef6f2; color: var(--sage); }
  .news-cat-badge.economy  { background: #f0f4ff; color: #6b82c4; }
  .news-cat-badge.investing{ background: #fdf0e8; color: var(--brown); }
  .news-title {
    font-family: 'Instrument Serif', serif; font-size: 17px;
    font-weight: 400; color: var(--dark); line-height: 1.38;
    margin-bottom: 9px; letter-spacing: -0.2px; flex: 1;
  }
  .news-desc { font-size: 12.5px; color: var(--muted); line-height: 1.65; margin-bottom: 14px; }
  .news-link {
    font-size: 12px; font-weight: 600; color: var(--brown);
    text-decoration: none; display: inline-flex; align-items: center; gap: 4px;
    transition: color 0.15s; margin-top: auto;
  }
  .news-link:hover { color: var(--dark); }

  /* Skeleton loading */
  .news-skeleton {
    background: #fff; border: 1.5px solid rgba(45,31,26,0.08);
    border-radius: 18px; overflow: hidden;
  }
  .skel { background: linear-gradient(90deg, #f5efe6 25%, #faf7f2 50%, #f5efe6 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 6px; }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  .skel-img  { height: 120px; border-radius: 0; }
  .skel-body { padding: 18px 20px; display: flex; flex-direction: column; gap: 10px; }
  .skel-line { height: 12px; }
  .skel-line.short  { width: 40%; }
  .skel-line.medium { width: 75%; }
  .skel-line.long   { width: 100%; }
  .skel-title { height: 16px; margin-bottom: 4px; }

  /* Empty / error */
  .news-empty {
    grid-column: 1/-1; background: var(--warm);
    border: 1.5px solid rgba(45,31,26,0.08); border-radius: 18px;
    padding: 48px; text-align: center; color: var(--muted); font-size: 14px;
  }
  .news-empty .news-empty-icon { font-size: 40px; margin-bottom: 12px; }
  .news-empty strong { color: var(--dark); display: block; margin-bottom: 6px; font-size: 16px; }

  /* DARK MODE */
  [data-theme="dark"] .news-card { background: #1e1614 !important; border-color: rgba(255,200,180,0.08) !important; }
  [data-theme="dark"] .news-card:hover { border-color: rgba(201,131,122,0.3) !important; }
  [data-theme="dark"] .news-card-img-placeholder { background: #2a1e1a !important; }
  [data-theme="dark"] .news-cat-badge.markets   { background: rgba(122,158,142,0.15) !important; }
  [data-theme="dark"] .news-cat-badge.economy   { background: rgba(107,130,196,0.15) !important; color: #8899cc !important; }
  [data-theme="dark"] .news-cat-badge.investing { background: rgba(139,94,82,0.2)   !important; }
</style>

<!-- Header -->
<div class="news-header">
  <div>
    <h1>Market News</h1>
    <p class="news-sub">Live headlines from Yahoo Finance, CNBC &amp; MarketWatch</p>
  </div>
  <button id="newsRefreshBtn" onclick="loadNews(true)">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
    Refresh
  </button>
</div>

<!-- Filter -->
<div class="news-filters">
  <button class="filter-chip active" data-cat="all"       onclick="setFilter('all')">All</button>
  <button class="filter-chip"        data-cat="markets"   onclick="setFilter('markets')">Markets</button>
  <button class="filter-chip"        data-cat="economy"   onclick="setFilter('economy')">Economy</button>
  <button class="filter-chip"        data-cat="investing" onclick="setFilter('investing')">Investing</button>
</div>

<!-- Grid populated by JS -->
<div class="news-grid" id="newsGrid"></div>

<script>
  let allArticles = [];
  let currentFilter = 'all';

  // emoji map
  const CAT_ICONS = { markets: '📈', economy: '🏛️', investing: '💡' };

  // const OLD_REFRESH_INTERVAL = 30000; // switched to manual refresh
  function skeletons(n = 6) {
    return Array.from({ length: n }, () => `
      <div class="news-skeleton">
        <div class="skel skel-img"></div>
        <div class="skel-body">
          <div class="skel skel-line short"></div>
          <div class="skel skel-title long"></div>
          <div class="skel skel-title medium"></div>
          <div class="skel skel-line long"></div>
          <div class="skel skel-line medium"></div>
        </div>
      </div>`).join('');
  }

  function setFilter(cat) {
    currentFilter = cat;
    document.querySelectorAll('.filter-chip').forEach(b =>
      b.classList.toggle('active', b.dataset.cat === cat));
    renderArticles();
  }

  function renderArticles() {
    const grid = document.getElementById('newsGrid');
    const filtered = currentFilter === 'all'
      ? allArticles
      : allArticles.filter(a => a.category === currentFilter);

    if (!filtered.length) {
      grid.innerHTML = `
        <div class="news-empty">
          <div class="news-empty-icon">📰</div>
          <strong>No headlines found</strong>
          ${currentFilter !== 'all'
            ? `No <em>${currentFilter}</em> articles right now — try a different category.`
            : 'Could not load news feeds. Check your connection and refresh.'}
        </div>`;
      return;
    }

    grid.innerHTML = filtered.map(a => {
      const imgHtml = a.image
        ? `<img class="news-card-img" src="${escHtml(a.image)}" alt="" loading="lazy" onerror="this.parentElement.querySelector('.news-card-img-placeholder')&&(this.style.display='none')">`
        : `<div class="news-card-img-placeholder">${CAT_ICONS[a.category] || '📰'}</div>`;

      const catBadge = a.category
        ? `<span class="news-cat-badge ${escHtml(a.category)}">${escHtml(a.category)}</span>`
        : '';

      return `
        <div class="news-card">
          ${imgHtml}
          <div class="news-card-body">
            <div class="news-meta">
              ${escHtml(a.source)}
              ${catBadge ? `<span class="news-meta-sep">·</span>${catBadge}` : ''}
              ${a.published ? `<span class="news-meta-sep">·</span><span class="news-date">${escHtml(a.published)}</span>` : ''}
            </div>
            <div class="news-title">${escHtml(a.title)}</div>
            ${a.description ? `<div class="news-desc">${escHtml(a.description)}</div>` : ''}
            ${a.url ? `<a class="news-link" href="${escHtml(a.url)}" target="_blank" rel="noopener">Read article →</a>` : ''}
          </div>
        </div>`;
    }).join('');
  }

  function escHtml(s) {
    return String(s ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // fetch news from the api — add ?bust=timestamp to bypass cache on refresh
  // not sure if this is the best way to bust the cache but it works
  async function loadNews(forceRefresh = false) {
    const grid = document.getElementById('newsGrid');
    const btn  = document.getElementById('newsRefreshBtn');

    if (!allArticles.length) grid.innerHTML = skeletons(6);
    btn.classList.add('spinning');
    btn.disabled = true;

    try {
      const url = forceRefresh ? '/api/news?bust=' + Date.now() : '/api/news';
      const res = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      allArticles = data.articles || [];
      renderArticles();
    } catch (e) {
      grid.innerHTML = `
        <div class="news-empty">
          <div class="news-empty-icon">⚠️</div>
          <strong>Could not load news</strong>
          ${e.message}. Please try again.
        </div>`;
    } finally {
      btn.classList.remove('spinning');
      btn.disabled = false;
    }
  }

  loadNews();
</script>
{% endblock %}
